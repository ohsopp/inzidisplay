# InfluxDB 2.x - PLC 데이터 저장용 (컨테이너 내부 8086 → 호스트 8090)
# 실행: docker compose -f docker-compose.influxdb.yml up -d
# 백엔드 기본 INFLUX_URL=http://127.0.0.1:8090 과 맞춤

services:
  influxdb:
    image: influxdb:2
    container_name: plc_influxdb
    ports:
      - "8090:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin1234
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: plc-influx-admin-token
      DOCKER_INFLUXDB_INIT_ORG: plc
      DOCKER_INFLUXDB_INIT_BUCKET: plc_data
      DOCKER_INFLUXDB_INIT_RETENTION: 52w
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

volumes:
  influxdb_data: {}
